<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>프로필 카드 실습</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f0f4f8;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #1a202c;
      margin-bottom: 40px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 32px 28px;
      width: 300px;
      text-align: center;
      flex: 1 1 260px;
      max-width: 320px;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3b82f6;
      margin-bottom: 16px;
    }

    .card .name {
      font-size: 20px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 6px;
    }

    .card .role {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 14px;
    }

    .card .bio {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .card .btn {
      display: inline-block;
      background-color: #3b82f6;
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
    }

    .card .btn:hover {
      background-color: #1d4ed8;
    }

    @media (max-width: 600px) {
      .card {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>👤 프로필 카드 실습</h1>

  <div class="card-container">

    <div class="card">
      <img src="" alt="김민준 프로필 사진"/>
      <div class="name">김민준</div>
      <div class="role">Frontend Developer</div>
      <p class="bio">
        React와 CSS로 깔끔한 UI를 만드는 것을 좋아합니다.
      </p>
      <button class="btn">프로필 보기</button>
    </div>

    <div class="card">
      <img src="" alt="이서연 프로필 사진"/>
      <div class="name">이서연</div>
      <div class="role">Data Scientist</div>
      <p class="bio">
        데이터 속에서 인사이트를 찾는 걸 즐기는 연구자입니다.
      </p>
      <button class="btn">프로필 보기</button>
    </div>

    <div class="card">
      <img src="" alt="박지호 프로필 사진"/>
      <div class="name">박지호</div>
      <div class="role">UX Designer</div>
      <p class="bio">
        사람 중심의 디자인으로 더 나은 경험을 만들어갑니다.
      </p>
      <button class="btn">프로필 보기</button>
    </div>

  </div>

</body>
</html>
